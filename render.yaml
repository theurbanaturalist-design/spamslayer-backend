services:
  - type: web
    name: spamslayer-backend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /api/health

    envVars:
      - key: NODE_ENV
        value: production

      # ── Fill these in Render dashboard -> Environment ──────────────────────
      # Never commit real values here — set them in the Render UI.

      - key: GOOGLE_API_KEY
        sync: false

      - key: GEMINI_MODEL
        value: gemini-2.5-flash

      - key: TWILIO_ACCOUNT_SID
        sync: false

      - key: TWILIO_AUTH_TOKEN
        sync: false

      - key: TWILIO_PHONE_NUMBER
        sync: false

      - key: BASE_URL
        sync: false          # Set to your Render URL, e.g. https://spamslayer.onrender.com
